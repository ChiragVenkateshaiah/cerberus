# infra/PLANNING_CHECKPOINT.yml
#
# Machine-readable record of deferred and pending infrastructure
# decisions for Cerberus. Any future planning session (Opus plan mode,
# a new Claude Code session, or a human reviewing the repo cold) MUST
# read this file before proposing new infra/ or platform/ changes.

deferred_decisions:
  - id: airflow-orchestration
    adr: docs/adr/009-defer-orchestration.md
    status: superseded
    decided_on: "2026-06-20"
    superseded_by: docs/adr/017-step-functions-orchestration.md
    superseded_on: "2026-06-29"
    summary: >
      Airflow (self-hosted or MWAA) was deferred due to idle billing cost.
      ADR 017 resolves the deferral by adopting AWS Step Functions (Standard)
      + EventBridge Scheduler — pay-per-state-transition, zero idle cost.
      The trigger condition ADR 009 was waiting for (no-idle-cost orchestrator)
      is satisfied. ADR 009 status updated to "Superseded by ADR 017".

open_dependencies:
  - id: iam-roles-for-serverless
    adr: docs/adr/008-iam-for-serverless.md
    status: resolved
    resolved_by: docs/adr/010-provisioning-runtime-identity-separation.md
    summary: >
      EMR Serverless and Athena execution roles are created and managed by
      the CI provisioning role (cerberus-ci-apply) via Tofu (Path B from
      ADR 008). cerberus-cli cannot create IAM roles and does not need to.
      See ADR 010 for identity-separation rationale; ADR 014 for the OIDC
      evolution that replaced cerberus-admin's static keys.

active_architecture:
  compute_engine: emr_serverless
  query_engine: athena
  catalog: glue_data_catalog
  orchestration: step_functions_standard + eventbridge_scheduler
  storage: s3
  table_format: iceberg
  observability: cloudwatch
  iac_tool: opentofu
  iac_layout: modules + envs/{dev,prod}/<stack> (ADR 013)
  state_layering: layered (00-foundation/10-iam/20-compute/30-orchestration)
  cross_stack_contract: ssm_parameter_store (/cerberus/<env>/<layer>/<resource>-arn)
  cicd: github_actions (plan-on-PR, apply-on-merge — ADR 015)
  provisioning_auth: oidc_federation (cerberus-ci-plan + cerberus-ci-apply — ADR 014)
  policy_as_code: tflint + trivy + conftest/OPA + terraform-docs + tofu-test (ADR 016)
  data_quality: pydeequ_gates_between_medallion_layers (ADR 018)
  cost_governance: budgets + cost_anomaly_detection + athena_bytes_cap + emr_max_capacity (ADR 019)
  iam_identities:
    provisioning: cerberus-ci-apply (OIDC role assumed by GitHub Actions — ADR 014)
    provisioning_plan: cerberus-ci-plan (OIDC role, read-only, PR runs — ADR 014)
    runtime: cerberus-cli (AWS CLI profile cerberus — ADR 010)
    separation_rationale: docs/adr/010-provisioning-runtime-identity-separation.md
    static_admin_keys: none (retired by ADR 014)
  rationale_docs:
    - docs/adr/001-initial-platform-oss-on-ec2.md
    - docs/adr/002-storage-s3-iceberg.md
    - docs/adr/003-iam-boundary.md
    - docs/adr/004-compute-bottleneck-discovered.md
    - docs/adr/005-pivot-to-serverless-compute.md
    - docs/adr/006-query-engine-athena.md
    - docs/adr/007-observability-cloudwatch.md
    - docs/adr/008-iam-for-serverless.md
    - docs/adr/009-defer-orchestration.md         # superseded by 017
    - docs/adr/010-provisioning-runtime-identity-separation.md  # auth portion superseded by 014
    - docs/adr/011-full-iac-ownership-and-bootstrap-boundary.md
    - docs/adr/012-layered-remote-state.md
    - docs/adr/013-multi-environment-layout.md
    - docs/adr/014-oidc-federation-ci-provisioning.md
    - docs/adr/015-github-actions-cicd.md
    - docs/adr/016-policy-as-code-iac-testing.md
    - docs/adr/017-step-functions-orchestration.md
    - docs/adr/018-data-quality-pydeequ.md
    - docs/adr/019-cost-governance.md

